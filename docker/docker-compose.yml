version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SHADOW_ENGINE_PORT=8000
      - SHADOW_ENGINE_HOST=0.0.0.0
      - SHADOW_ENGINE_REDIS_URL=redis://redis:6379
      - SHADOW_ENGINE_API_KEY=${SHADOW_ENGINE_API_KEY:-}
      - SHADOW_ENGINE_STORAGE_PATH=/home/shadow/data
    volumes:
      - app_data:/home/shadow/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
  app_data: